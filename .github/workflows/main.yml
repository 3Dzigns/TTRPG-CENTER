name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      review_mode:
        description: 'Review mode'
        required: true
        default: 'diff'
        type: choice
        options: [diff, full]
      model:
        description: 'OpenAI model (e.g., gpt-4o-mini, gpt-4o)'
        required: false
        default: 'gpt-4o-mini'
        type: string

permissions:
  contents: write
  pull-requests: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Init env (mode/model/timestamp)
        shell: bash
        run: |
          set -euo pipefail
          # Mode: default to 'diff' for PRs; use input for manual runs
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ inputs.review_mode }}"
            MODEL="${{ inputs.model }}"
          else
            MODE="diff"
            MODEL="gpt-4o-mini"
          fi
          TS="$(date -u +%Y%m%dT%H%M%SZ)"
          OUT="docs/reviews/${TS}.json"
          mkdir -p docs/reviews
          echo "MODE=$MODE"        >> "$GITHUB_ENV"
          echo "OPENAI_MODEL=$MODEL" >> "$GITHUB_ENV"
          echo "TIMESTAMP=$TS"     >> "$GITHUB_ENV"
          echo "OUTFILE=$OUT"      >> "$GITHUB_ENV"

      - name: Compute patch (exclude *.md)
        id: patch
        shell: bash
        run: |
          set -euo pipefail
          if [ "$MODE" = "diff" ]; then
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              BASE_SHA="${{ github.event.pull_request.base.sha }}"
              HEAD_SHA="${{ github.sha }}"
            else
              DEFAULT_BRANCH="${{ github.event.repository.default_branch || 'main' }}"
              git fetch origin "$DEFAULT_BRANCH" --depth=1
              BASE_SHA="origin/$DEFAULT_BRANCH"
              HEAD_SHA="HEAD"
            fi
            git diff --unified=3 "${BASE_SHA}...${HEAD_SHA}" -- . ":(exclude)**/*.md" > review.patch || true
          else
            EMPTY_TREE="$(git hash-object -t tree /dev/null)"
            git diff --unified=3 "$EMPTY_TREE" HEAD -- . ":(exclude)**/*.md" > review.patch || true
          fi

          if [ ! -s review.patch ]; then
            printf '{\n' > "${OUTFILE}"
            printf '  "summary": ["No applicable code changes (non-.md) found."],\n' >> "${OUTFILE}"
            printf '  "findings": [],\n' >> "${OUTFILE}"
            printf '  "tests": [],\n' >> "${OUTFILE}"
            printf '  "security_concurrency": [],\n' >> "${OUTFILE}"
            printf '  "go_no_go": "GO"\n' >> "${OUTFILE}"
            printf '}\n' >> "${OUTFILE}"
            echo "empty=1" >> "$GITHUB_OUTPUT"
          else
            echo "empty=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Build OpenAI request body (JSON-safe, no Python)
        if: steps.patch.outputs.empty != '1'
        shell: bash
        run: |
          set -euo pipefail
          # Read the patch and JSON-escape it as a raw string
          PATCH_JSON=$(jq -Rs . < review.patch)

          # System prompt (exact text from your spec)
          SYSTEM_PROMPT=$'You are a senior software engineer performing a peer review of a pull request.\n\nSTRICT SCOPE\n- Review ONLY the supplied git DIFF/patch for this PR (changed lines and immediate context).\n- Do NOT review or critique changes made to Markdown files (*.md). Treat .md diffs as documentation/context only.\n- You may use .md content to understand requirements or intended behavior, but do NOT flag issues about .md changes.\n- Do NOT review project-wide requirements, policies, or architecture unless changed lines in code directly violate them.\n- Do NOT summarize the whole repo; focus only on code changes.\n\nOUTPUT FORMAT\n1. Summary: 2-5 bullet points.\n2. Findings: Numbered list. Each finding MUST include:\n   - File path and line(s) from the code diff\n   - Issue description or improvement opportunity\n   - Concrete suggestion with a sample code or patch snippet showing a possible resolution\n   - Severity: LOW | MEDIUM | HIGH | CRITICAL\n3. Tests: Explicitly call out missing or to-be-updated tests for the new code.\n4. Security/Concurrency: Only if visible in the code diff; include the lines and a sample mitigation.\n5. GO/NO-GO: Decide based only on the code diff.\n\nTONE\n- Be concise, technical, and actionable.\n- Always include at least one possible resolution (sample code, config change, or patch) for each issue.\n- If context outside the diff is needed, state clearly: Assumption: ...\n\nRemember: this is a developer code review of code changes only. Markdown files are context, not review targets.'

          # Compose messages array with jq (no heredoc Python)
          jq -n \
            --arg model   "${OPENAI_MODEL}" \
            --arg system  "$SYSTEM_PROMPT" \
            --arg patch   "$(printf 'DIFF START\n'; cat review.patch; printf '\nDIFF END\nReturn ONLY valid JSON with keys: summary, findings, tests, security_concurrency, go_no_go.\n')" \
            '{
              model: $model,
              temperature: 0,
              response_format: {type:"json_object"},
              messages: [
                {role:"system", content:$system},
                {role:"user",   content:$patch}
              ]
            }' > body.json

      - name: Call OpenAI
        if: steps.patch.outputs.empty != '1'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          curl -sS https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer ${OPENAI_API_KEY}" \
            -H "Content-Type: application/json" \
            -d @body.json \
            | jq -r '.choices[0].message.content' > "${OUTFILE}"

      - name: Commit and push review artifact
        shell: bash
        run: |
          set -euo pipefail
          if [ -f "${OUTFILE}" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add "${OUTFILE}"
            git commit -m "AI review: ${TIMESTAMP} (${MODE})" || exit 0
            git push
          fi
