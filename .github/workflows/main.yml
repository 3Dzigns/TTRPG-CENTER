name: Main CI (AI Review + Status)

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'docs/review_status.md'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'docs/review_status.md'

permissions:
  contents: write
  pull-requests: write

jobs:
  ai-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install --disable-pip-version-check requests

      - name: Validate OPENAI_API_KEY
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ] || [ "$OPENAI_API_KEY" = "***" ]; then
            echo "ERROR: OPENAI_API_KEY is missing or placeholder. Add in Settings → Secrets → Actions."
            exit 1
          fi

      - name: Build context pack
        run: |
          mkdir -p artifacts/ci
          python scripts/ci/make_context_pack.py

      - name: Read review mode
        id: mode
        run: |
          MODE=diff
          if [ -f ".ci/review_mode.txt" ]; then
            MODE=$(tr -d '\r\n\t ' < .ci/review_mode.txt)
          fi
          if [ "$MODE" != "full" ]; then MODE=diff; fi
          echo "mode=$MODE" >> $GITHUB_OUTPUT
          echo "Selected review mode: $MODE"

      - name: Generate DIFF (push)
        if: steps.mode.outputs.mode == 'diff' && github.event_name == 'push'
        id: diff_push
        run: |
          if git rev-parse HEAD^ >/dev/null 2>&1; then
            git diff --unified=0 HEAD^...HEAD > pr.diff || true
          else
            : > pr.diff
          fi
          echo "DIFF_PATH=pr.diff" >> $GITHUB_OUTPUT
          wc -l pr.diff || true

      - name: Generate DIFF (pull_request)
        if: steps.mode.outputs.mode == 'diff' && github.event_name == 'pull_request'
        id: diff_pr
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1 || true
          git diff --unified=0 origin/${{ github.base_ref }}...HEAD > pr.diff || true
          echo "DIFF_PATH=pr.diff" >> $GITHUB_OUTPUT
          wc -l pr.diff || true

      - name: Run AI review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GIT_COMMIT_SHA: ${{ github.sha }}
        run: |
          mkdir -p artifacts/ci artifacts/review/ci docs/reviews docs/reviews_json
          DIFF_PATH="pr.diff"
          if [ "${{ steps.mode.outputs.mode }}" != "diff" ]; then
            DIFF_PATH="/dev/null"
          fi

          python scripts/ci/ai_review.py \
            --mode ${{ steps.mode.outputs.mode }} \
            --diff "$DIFF_PATH" \
            --context artifacts/ci/context.jsonl \
            --out_json artifacts/ci/ai-review.json \
            --out_md artifacts/review/ci/review.md

          cp artifacts/review/ci/review.md "docs/reviews/${GIT_COMMIT_SHA}.md"
          cp artifacts/ci/ai-review.json  "docs/reviews_json/${GIT_COMMIT_SHA}.json"

      - name: Upload review artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ai-review
          path: |
            artifacts/ci/ai-review.json
            artifacts/review/ci/review.md

      - name: Commit review docs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/reviews docs/reviews_json
          git commit -m "chore(ci): add AI review for $GITHUB_SHA [skip ci]" || echo "No changes to commit"
          git push

      - name: Write Status Page (docs/review_status.md)
        run: |
          python - << 'PY'
          import json, pathlib, time, os
          p = pathlib.Path("artifacts/ci/ai-review.json")
          data = json.loads(p.read_text())
          ok = data.get("ok", False)
          high = [i for i in data.get("issues", []) if i.get("severity")=="high"]
          sha = data.get("metadata", {}).get("sha","")
          ts = time.strftime("%Y-%m-%d %H:%M:%S UTC", time.gmtime())
          review_md = f"docs/reviews/{sha}.md"
          review_json = f"docs/reviews_json/{sha}.json"
          md = []
          md.append("# Review Status")
          md.append(f"**SHA:** `{sha}`  ")
          md.append(f"**STATUS:** {'OK' if ok and not high else 'FAIL'}  ")
          md.append(f"**HIGH_ISSUES:** {len(high)}  ")
          md.append(f"**UPDATED:** {ts}")
          md.append("")
          md.append("## Summary")
          md.append(data.get("summary","")) ; md.append("")
          md.append("## Full Review")
          md.append(f"See **[{review_md}]({review_md})** for details.") ; md.append("")
          md.append("## Raw JSON")
          md.append(f"[{review_json}]({review_json})") ; md.append("")
          md.append("## Provider")
          md.append(data.get("metadata",{}).get("provider","openai")) ; md.append("")
          md.append("## Notes")
          md.append("This file is auto-updated by CI. Claude must read this file before proceeding.")
          pathlib.Path("docs").mkdir(exist_ok=True)
          pathlib.Path("docs/review_status.md").write_text("\n".join(md), encoding="utf-8")
          PY

      - name: Commit Status Page
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/review_status.md
          git commit -m "chore(ci): update review status [skip ci]" || echo "No changes to commit"
          git push
