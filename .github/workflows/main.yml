name: AI Code Review (OpenAI, Diff-Only)

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [ "**" ]

permissions:
  contents: read
  pull-requests: write

env:
  OPENAI_MODEL: gpt-4o-mini     # adjust if you prefer a different model
  MAX_CHARS_PER_CHUNK: "120000" # keep comfortably under model limits
  FAIL_ON_SEVERITY: "none"      # options: none | high | critical

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute diff vs base
        id: diff
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          echo "Base: $BASE_SHA"
          echo "Head: $HEAD_SHA"

          # Unified diff, no context (keeps the payload smaller but precise)
          git diff --unified=0 "$BASE_SHA" "$HEAD_SHA" > diff.patch

          if [ ! -s diff.patch ]; then
            echo "No changes detected in diff."
            echo "has_diff=false" >> $GITHUB_OUTPUT
          else
            echo "has_diff=true" >> $GITHUB_OUTPUT
          fi

      - name: Stop if no diff
        if: steps.diff.outputs.has_diff == 'false'
        run: echo "Nothing to review."

      - name: Prepare prompt
        if: steps.diff.outputs.has_diff == 'true'
        run: |
          mkdir -p .github/ai
          cat > .github/ai/prompt.txt <<'PROMPT'
You are a senior software engineer doing a PEER REVIEW of a pull request.

STRICT SCOPE:
- Review ONLY the supplied git DIFF/patch for this PR (changed lines & immediate context).
- DO NOT discuss project requirements, architecture, or policies unless they are directly violated by lines in the diff.
- DO NOT summarize the whole repo—focus purely on the code changes.

OUTPUT FORMAT (concise, actionable):
- Summary: 2–5 bullet points
- Findings: numbered items; each item MUST include:
  * File path and line(s) from the diff
  * What’s wrong / improvement opportunity
  * Concrete suggestion or snippet (patch-ready where possible)
  * Severity: LOW | MEDIUM | HIGH | CRITICAL
- Tests: list missing/updated tests specifically tied to changed code
- Security/Concurrency (only if evident in the diff): call out exact lines and the risk
- GO/NO-GO at the end (based ONLY on the diff): GO if mergeable as-is; otherwise NO-GO with the 1–3 blocking items.

Assume the reviewer cannot see any files beyond this diff. If a point depends on unseen code, say “Assumption: …” explicitly.

Now review the following DIFF:
PROMPT

      - name: Chunk diff
        if: steps.diff.outputs.has_diff == 'true'
        id: chunk
        run: |
          python3 - <<'PY'
import os, sys, math
max_chars = int(os.environ.get("MAX_CHARS_PER_CHUNK","120000"))
data = open("diff.patch","r",encoding="utf-8",errors="ignore").read()
chunks = [data[i:i+max_chars] for i in range(0, len(data), max_chars)]
os.makedirs(".github/ai", exist_ok=True)
for i, ch in enumerate(chunks, start=1):
    with open(f".github/ai/chunk_{i:03d}.patch","w",encoding="utf-8") as f:
        f.write(ch)
print(f"CHUNKS={len(chunks)}")
PY

      - name: Run OpenAI review (per chunk) and aggregate
        if: steps.diff.outputs.has_diff == 'true'
        uses: actions/github-script@v7
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ env.OPENAI_MODEL }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const basePrompt = fs.readFileSync('.github/ai/prompt.txt','utf8');
            const chunkFiles = fs.readdirSync('.github/ai')
              .filter(f => f.startsWith('chunk_') && f.endsWith('.patch'))
              .sort();
            if (!process.env.OPENAI_API_KEY) {
              core.setFailed('Missing OPENAI_API_KEY secret.');
              return;
            }

            async function askOpenAI(content) {
              const r = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                  'Authorization': `Bearer ${process.env.OPENAI_API_KEY}`,
                  'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                  model: process.env.OPENAI_MODEL || 'gpt-4o-mini',
                  temperature: 0.2,
                  messages: [
                    { role: 'system', content: 'You are a precise, terse, and helpful senior engineer.' },
                    { role: 'user', content: content }
                  ]
                })
              });
              if (!r.ok) {
                const txt = await r.text();
                throw new Error(`OpenAI error: ${r.status} ${txt}`);
              }
              const json = await r.json();
              return json.choices?.[0]?.message?.content || '';
            }

            let aggregate = [];
            for (const f of chunkFiles) {
              const diff = fs.readFileSync(path.join('.github/ai', f),'utf8');
              const prompt = `${basePrompt}\n\n--- DIFF CHUNK ${f} ---\n${diff}`;
              const out = await askOpenAI(prompt);
              aggregate.push(`### Review for ${f}\n${out}`);
            }
            const full = aggregate.join("\n\n---\n\n");
            fs.writeFileSync('.github/ai/review.md', full);

      - name: Post PR review comment
        if: steps.diff.outputs.has_diff == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('.github/ai/review.md','utf8');
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              event: 'COMMENT',
              body
            });

      - name: Optionally fail on HIGH/CRITICAL
        if: steps.diff.outputs.has_diff == 'true' && env.FAIL_ON_SEVERITY != 'none'
        run: |
          if grep -Eiq "Severity:\s*(CRITICAL|HIGH)" .github/ai/review.md; then
            if [ "${FAIL_ON_SEVERITY}" != "none" ]; then
              echo "HIGH/CRITICAL findings present. Failing check per policy."
              exit 2
            fi
          fi
