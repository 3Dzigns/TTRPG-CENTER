name: AI Code Review (OpenAI, Diff-Only)

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

env:
  OPENAI_MODEL: gpt-4o-mini
  MAX_BYTES_PER_CHUNK: 120000
  FAIL_ON_SEVERITY: none  # none | high | critical

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show PR SHAs (debug)
        shell: bash
        run: |
          set -euo pipefail
          echo "BASE=${{ github.event.pull_request.base.sha }}"
          echo "HEAD=${{ github.event.pull_request.head.sha }}"

      - name: Compute code diff (exclude .md)
        id: diff
        shell: bash
        run: |
          set -euo pipefail
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          echo "::group::Changed files (raw)"
          git diff --name-only "$BASE_SHA" "$HEAD_SHA" || true
          echo "::endgroup::"

          mapfile -t CODE_FILES < <(git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep -Evi '\.md$' || true)

          if [ "${#CODE_FILES[@]}" -eq 0 ]; then
            echo "No non-Markdown changes."
            echo "has_diff=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "::group::Code files to review"
          printf '%s\n' "${CODE_FILES[@]}"
          echo "::endgroup::"

          git diff --unified=0 "$BASE_SHA" "$HEAD_SHA" -- "${CODE_FILES[@]}" > diff.patch || true

          if [ ! -s diff.patch ]; then
            echo "Diff patch is empty after filtering."
            echo "has_diff=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_diff=true" >> "$GITHUB_OUTPUT"
            echo "::group::Diff (first 200 lines)"
            head -n 200 diff.patch
            echo "::endgroup::"
          fi

      - name: Stop if no diff
        if: steps.diff.outputs.has_diff == 'false'
        run: echo "Nothing to review."

      - name: Ensure OPENAI_API_KEY is present
        if: steps.diff.outputs.has_diff == 'true'
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${OPENAI_API_KEY:-}" ]; then
            echo "::error::OPENAI_API_KEY secret is missing."
            exit 1
          fi
          echo "OPENAI_API_KEY found."

      - name: Chunk diff file
        if: steps.diff.outputs.has_diff == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .github/ai
          rm -f .github/ai/chunk_*.patch || true
          split -b "${MAX_BYTES_PER_CHUNK}" -d -a 3 diff.patch .github/ai/chunk_ || true

          shopt -s nullglob
          COUNT=0
          for f in .github/ai/chunk_*; do
            mv "$f" "${f}.patch"
            COUNT=$((COUNT+1))
          done
          if [ "$COUNT" -eq 0 ]; then
            cp diff.patch .github/ai/chunk_000.patch
            COUNT=1
          fi
          echo "Chunks created: $COUNT"
          echo "::group::Chunk list"
          ls -la .github/ai/chunk_*.patch
          echo "::endgroup::"

      - name: Run OpenAI review and aggregate
        if: steps.diff.outputs.has_diff == 'true'
        uses: actions/github-script@v7
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ env.OPENAI_MODEL }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            function fail(msg) { core.setFailed(msg); throw new Error(msg); }
            if (!process.env.OPENAI_API_KEY) fail('Missing OPENAI_API_KEY.');

            // Prefer repo prompt file; if missing, fall back to an inline array (joined) to avoid YAML newline issues.
            let basePrompt = '';
            const promptPath = '.github/ai/prompt.txt';
            if (fs.existsSync(promptPath)) {
              basePrompt = fs.readFileSync(promptPath, 'utf8').trim();
              if (!basePrompt) core.warning('prompt.txt is empty; using fallback prompt.');
            }
            if (!basePrompt) {
              basePrompt = [
                'You are a senior software engineer performing a peer review of a pull request.',
                '',
                'STRICT SCOPE',
                '- Review ONLY the supplied git DIFF/patch for this PR (changed lines and immediate context).',
                '- Do NOT review or critique changes made to Markdown files (*.md). Treat .md diffs as documentation/context only.',
                '- You may use .md content to understand requirements or intended behavior, but do NOT flag issues about .md changes.',
                '- Do NOT review project-wide requirements, policies, or architecture unless changed lines in code directly violate them.',
                '- Do NOT summarize the whole repo; focus only on code changes.',
                '',
                'OUTPUT FORMAT',
                '1. Summary: 2-5 bullet points.',
                '2. Findings: Numbered list. Each finding MUST include:',
                '   - File path and line(s) from the code diff',
                '   - Issue description or improvement opportunity',
                '   - Concrete suggestion with a sample code or patch snippet showing a possible resolution',
                '   - Severity: LOW | MEDIUM | HIGH | CRITICAL',
                '3. Tests: Explicitly call out missing or to-be-updated tests for the new code.',
                '4. Security/Concurrency: Only if visible in the code diff; include the lines and a sample mitigation.',
                '5. GO/NO-GO: Decide based only on the code diff.',
                '',
                'TONE',
                '- Be concise, technical, and actionable.',
                '- Always include at least one possible resolution (sample code, config change, or patch) for each issue.',
                '- If context outside the diff is needed, state clearly: Assumption: ...',
                '',
                'Remember: this is a developer code review of code changes only. Markdown files are context, not review targets.'
              ].join('\n');
            }

            const chunkFiles = fs.readdirSync('.github/ai')
              .filter(f => f.startsWith('chunk_') && f.endsWith('.patch'))
              .sort();
            if (chunkFiles.length === 0) fail('No diff chunks found.');

            async function askOpenAI(content) {
              const r = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                  'Authorization': `Bearer ${process.env.OPENAI_API_KEY}`,
                  'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                  model: process.env.OPENAI_MODEL || 'gpt-4o-mini',
                  temperature: 0.2,
                  messages: [
                    { role: 'system', content: 'You are a precise, terse, and helpful senior engineer.' },
                    { role: 'user', content: content }
                  ]
                })
              });
              const txt = await r.text();
              if (!r.ok) fail(`OpenAI error ${r.status}: ${txt}`);
              let json; try { json = JSON.parse(txt); } catch (e) { fail(`OpenAI response parse error: ${e.message}\nRaw: ${txt}`); }
              const out = json.choices?.[0]?.message?.content ?? '';
              return out;
            }

            let parts = [];
            for (const f of chunkFiles) {
              const diff = fs.readFileSync(path.join('.github/ai', f),'utf8');
              const prompt = `${basePrompt}\n\n--- DIFF CHUNK ${f} ---\n${diff}`;
              core.info(`Sending ${f} to OpenAI (${diff.length} bytes)`);
              const out = await askOpenAI(prompt);
              parts.push(`### Review for ${f}\n${out}`);
            }
            fs.writeFileSync('.github/ai/review.md', parts.join('\n\n---\n\n'));
            core.info('Wrote .github/ai/review.md');

      - name: Print review excerpt (debug)
        if: steps.diff.outputs.has_diff == 'true'
        shell: bash
        run: |
          set -euo pipefail
          echo "::group::Review (first 80 lines)"
          head -n 80 .github/ai/review.md || true
          echo "::endgroup::"

      - name: Post PR review comment
        if: steps.diff.outputs.has_diff == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('.github/ai/review.md')) {
              core.setFailed('review.md missing; cannot post comment.');
            } else {
              const body = fs.readFileSync('.github/ai/review.md','utf8').trim();
              if (!body) {
                core.setFailed('review.md is empty; refusing to post an empty comment.');
              } else {
                await github.rest.pulls.createReview({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: context.payload.pull_request.number,
                  event: 'COMMENT',
                  body
                });
              }
            }

      - name: Optionally fail on HIGH/CRITICAL findings
        if: steps.diff.outputs.has_diff == 'true' && env.FAIL_ON_SEVERITY != 'none'
        shell: bash
        run: |
          set -euo pipefail
          if grep -Eiq "Severity:\s*(CRITICAL|HIGH)" .github/ai/review.md; then
            if [ "${FAIL_ON_SEVERITY}" != "none" ]; then
              echo "::error::HIGH/CRITICAL findings present. Failing check per policy."
              exit 2
            fi
          fi
