name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      model:
        description: 'OpenAI model (e.g., gpt-4o-mini, gpt-4o)'
        required: false
        default: 'gpt-4o-mini'
        type: string

permissions:
  contents: write
  pull-requests: read

jobs:
  review:
    runs-on: ubuntu-latest
    env:
      MAX_SINGLE_BYTES: "900000"  # ~0.9MB: above this we chunk
      CHUNK_BYTES: "350000"       # chunk size if we split
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Init env (model/timestamp)
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODEL="${{ inputs.model }}"
          else
            MODEL="gpt-4o-mini"
          fi
          TS="$(date -u +%Y%m%dT%H%M%SZ)"
          OUT="docs/reviews/${TS}.json"
          mkdir -p docs/reviews
          echo "MODE=diff"             >> "$GITHUB_ENV"
          echo "OPENAI_MODEL=$MODEL"   >> "$GITHUB_ENV"
          echo "TIMESTAMP=$TS"         >> "$GITHUB_ENV"
          echo "OUTFILE=$OUT"          >> "$GITHUB_ENV"

      - name: Compute patch (exclude *.md)
        id: patch
        shell: bash
        run: |
          set -euo pipefail
          # Always run in diff mode only
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.sha }}"
          else
            DEFAULT_BRANCH="${{ github.event.repository.default_branch || 'main' }}"
            git fetch origin "$DEFAULT_BRANCH" --depth=1
            BASE_SHA="origin/$DEFAULT_BRANCH"
            HEAD_SHA="HEAD"
          fi
          git diff --unified=3 "${BASE_SHA}...${HEAD_SHA}" \
            -- . ":(exclude)**/*.md" > review.patch || true

          if [ ! -s review.patch ]; then
            printf '{\n' > "${OUTFILE}"
            printf '  "summary": ["No applicable code changes (non-.md) found."],\n' >> "${OUTFILE}"
            printf '  "findings": [],\n' >> "${OUTFILE}"
            printf '  "tests": [],\n' >> "${OUTFILE}"
            printf '  "security_concurrency": [],\n' >> "${OUTFILE}"
            printf '  "go_no_go": "GO"\n' >> "${OUTFILE}"
            printf '}\n' >> "${OUTFILE}"
            echo "empty=1" >> "$GITHUB_OUTPUT"
          else
            echo "empty=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare system prompt (file)
        if: steps.patch.outputs.empty != '1'
        shell: bash
        run: |
          cat > system.txt <<'TXT'
You are a senior software engineer performing a peer review of a pull request.

STRICT SCOPE
- Review ONLY the supplied git DIFF/patch for this PR (changed lines and immediate context).
- Do NOT review or critique changes made to Markdown files (*.md). 
  Treat .md diffs as documentation/context only.
- You may use .md content to understand requirements or intended behavior, 
  but do NOT flag issues about .md changes.
- Do NOT review project-wide requirements, policies, or architecture 
  unless changed lines in code directly violate them.
- Do NOT summarize the whole repo; focus only on code changes.

OUTPUT FORMAT
1. Summary: 2-5 bullet points.
2. Findings: Numbered list. Each finding MUST include:
   - File path and line(s) from the code diff
   - Issue description or improvement opportunity
   - Concrete suggestion with a sample code or patch snippet 
     showing a possible resolution
   - Severity: LOW | MEDIUM | HIGH | CRITICAL
3. Tests: Explicitly call out missing or to-be-updated tests for the new code.
4. Security/Concurrency: Only if visible in the code diff; 
   include the lines and a sample mitigation.
5. GO/NO-GO: Decide based only on the code diff.

TONE
- Be concise, technical, and actionable.
- Always include at least one possible resolution 
  (sample code, config change, or patch) for each issue.
- If context outside the diff is needed, state clearly: Assumption: ...

Remember: this is a developer code review of code changes only. 
Markdown files are context, not review targets.
TXT

      - name: Size check and maybe split
        if: steps.patch.outputs.empty != '1'
        id: sizecheck
        shell: bash
        run: |
          set -euo pipefail
          BYTES=$(wc -c < review.patch | tr -d ' ')
          echo "patch_bytes=$BYTES" >> "$GITHUB_OUTPUT"
          if [ "$BYTES" -le "${MAX_SINGLE_BYTES}" ]; then
            echo "mode=single" >> "$GITHUB_OUTPUT"
          else
            echo "mode=chunked" >> "$GITHUB_OUTPUT"
            rm -f chunk_* || true
            # Split by bytes into chunk_000, chunk_001, ...
            split -b "${CHUNK_BYTES}" -d -a 3 review.patch chunk_
            ls -1 chunk_* > chunk_list.txt
            COUNT=$(wc -l < chunk_list.txt | tr -d ' ')
            echo "chunks=$COUNT" >> "$GITHUB_OUTPUT"
          fi

      - name: Build request (single)
        if: steps.sizecheck.outputs.mode == 'single'
        shell: bash
        run: |
          set -euo pipefail
          jq -n \
            --arg model "${OPENAI_MODEL}" \
            --rawfile system system.txt \
            --rawfile patch review.patch \
            '{
              model: $model,
              temperature: 0,
              response_format: {type:"json_object"},
              messages: [
                {role:"system", content:$system},
                {
                  role: "user",
                  content: (
                    "DIFF START\n" + $patch + 
                    "\nDIFF END\nReturn ONLY valid JSON with keys: " +
                    "summary, findings, tests, security_concurrency, go_no_go."
                  )
                }
              ]
            }' > body.json

      - name: Call OpenAI (single)
        if: steps.sizecheck.outputs.mode == 'single'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          curl -sS https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer ${OPENAI_API_KEY}" \
            -H "Content-Type: application/json" \
            -d @body.json \
            | jq -r '.choices[0].message.content' > "${OUTFILE}"

      - name: Build & call OpenAI for each chunk
        if: steps.sizecheck.outputs.mode == 'chunked'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          i=0
          total=$(wc -l < chunk_list.txt | tr -d ' ')
          while read -r f; do
            i=$((i+1))
            jq -n \
              --arg model "${OPENAI_MODEL}" \
              --rawfile system system.txt \
              --rawfile patch "$f" \
              --arg idx "$i" --arg total "$total" \
              '{
                model: $model,
                temperature: 0,
                response_format: {type:"json_object"},
                messages: [
                  {role:"system", content:$system},
                  {
                    role: "user",
                    content: (
                      "DIFF CHUNK " + $idx + "/" + $total + "\n" + $patch +
                      "\nReturn ONLY valid JSON with keys: " +
                      "summary, findings, tests, security_concurrency, go_no_go. " +
                      "Limit to just this chunk."
                    )
                  }
                ]
              }' > "body_$i.json"

            curl -sS https://api.openai.com/v1/chat/completions \
              -H "Authorization: Bearer ${OPENAI_API_KEY}" \
              -H "Content-Type: application/json" \
              -d @"body_$i.json" \
              | jq -r '.choices[0].message.content' > "out_$i.json"
          done < chunk_list.txt

      - name: Merge chunked results
        if: steps.sizecheck.outputs.mode == 'chunked'
        shell: bash
        run: |
          set -euo pipefail
          # Merge all out_*.json into one final JSON per the schema
          jq -s '
            def norm:
              {
                summary: (.summary // []),
                findings: (.findings // []),
                tests: (.tests // []),
                security_concurrency: (.security_concurrency // []),
                go_no_go: (.go_no_go // "GO")
              };
            # Normalize each, then fold
            ( map(norm) ) as $arr
            |
            {
              summary: ( [ $arr[].summary[] ] ),
              findings: ( [ $arr[].findings[] ] ),
              tests: ( [ $arr[].tests[] ] ),
              security_concurrency: ( [ $arr[].security_concurrency[] ] ),
              go_no_go: ( if ( [ $arr[].go_no_go ] | any(. == "NO-GO") ) then "NO-GO" else "GO" end )
            }
          ' out_*.json > "${OUTFILE}"

      - name: Commit and push review artifact
        shell: bash
        run: |
          set -euo pipefail
          if [ -f "${OUTFILE}" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add "${OUTFILE}"
            git commit -m "AI review: ${TIMESTAMP} (diff mode)" || exit 0
            git push
          fi
