name: AI Code Review (OpenAI, Diff-Only)

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: ["**"]

permissions:
  contents: read
  pull-requests: write

env:
  OPENAI_MODEL: gpt-4o-mini         # change if you prefer a different model
  MAX_BYTES_PER_CHUNK: 120000       # chunk size for diff splits
  FAIL_ON_SEVERITY: none            # none | high | critical

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute code diff (exclude .md)
        id: diff
        shell: bash
        run: |
          set -euo pipefail
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          echo "Base: $BASE_SHA"
          echo "Head: $HEAD_SHA"

          # Unified diff with minimal context; exclude markdown files
          git diff --unified=0 "$BASE_SHA" "$HEAD_SHA" ":(exclude)*.md" > diff.patch || true

          if [ ! -s diff.patch ]; then
            echo "No code diff to review."
            echo "has_diff=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_diff=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Stop if no diff
        if: steps.diff.outputs.has_diff == 'false'
        run: echo "Nothing to review."

      - name: Prepare prompt (printf; no heredoc)
        if: steps.diff.outputs.has_diff == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .github/ai
          printf "%s\n" \
"You are a senior software engineer performing a peer review of a pull request." \
"" \
"STRICT SCOPE" \
"- Review ONLY the supplied git DIFF/patch for this PR (changed lines & immediate context)." \
"- DO NOT review or critique changes made to Markdown files (*.md). Treat .md diffs as documentation/context only." \
"- You may use .md content to understand requirements or intended behavior, but DO NOT flag issues or give suggestions about .md changes." \
"- DO NOT review project-wide requirements, policies, or architecture unless the changed lines in code directly violate them." \
"- DO NOT summarize the whole repo — focus only on the code changes." \
"" \
"OUTPUT FORMAT" \
"1. **Summary**: 2–5 bullet points (what was improved or concerning in the code diff)." \
"2. **Findings**: Numbered list. Each finding MUST include:" \
"   - File path and line(s) from the code diff" \
"   - Issue description or improvement opportunity" \
"   - Concrete suggestion with a sample code or patch snippet showing a possible resolution" \
"   - Severity: LOW | MEDIUM | HIGH | CRITICAL" \
"3. **Tests**: Explicitly call out tests that are missing or need updating for the new code." \
"4. **Security/Concurrency**: Only if visible in the code diff — call out exact lines and risks, with a sample mitigation." \
"5. **GO/NO-GO**: Decide based ONLY on the code diff. “GO” if mergeable as-is; “NO-GO” if blocking issues remain." \
"" \
"TONE" \
"- Be concise, technical, and actionable." \
"- Always provide at least one possible resolution (sample code, config change, or patch) for each issue." \
"- If context outside the diff is needed, state clearly: “Assumption: …”." \
"" \
"Remember: this is a developer code review of code changes only. Markdown files are context, not review targets." \
> .github/ai/prompt.txt

      - name: Chunk diff file (no heredoc)
        if: steps.diff.outputs.has_diff == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .github/ai
          CHUNK_COUNT=0
          # Split by bytes; files will be .github/ai/chunk_000, chunk_001, ...
          split -b "${MAX_BYTES_PER_CHUNK}" -d -a 3 diff.patch .github/ai/chunk_ || true
          shopt -s nullglob
          for f in .github/ai/chunk_*; do
            mv "$f" "${f}.patch"
            CHUNK_COUNT=$((CHUNK_COUNT+1))
          done
          echo "Created $CHUNK_COUNT chunk(s)."

      - name: Run OpenAI review and aggregate
        if: steps.diff.outputs.has_diff == 'true'
        uses: actions/github-script@v7
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ env.OPENAI_MODEL }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const basePrompt = fs.readFileSync('.github/ai/prompt.txt','utf8');
            const chunkFiles = fs.readdirSync('.github/ai')
              .filter(f => f.startsWith('chunk_') && f.endsWith('.patch'))
              .sort();

            if (!process.env.OPENAI_API_KEY) {
              core.setFailed('Missing OPENAI_API_KEY secret.');
              return;
            }

            async function askOpenAI(content) {
              const r = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                  'Authorization': `Bearer ${process.env.OPENAI_API_KEY}`,
                  'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                  model: process.env.OPENAI_MODEL || 'gpt-4o-mini',
                  temperature: 0.2,
                  messages: [
                    { role: 'system', content: 'You are a precise, terse, and helpful senior engineer.' },
                    { role: 'user', content: content }
                  ]
                })
              });
              if (!r.ok) {
                const txt = await r.text();
                throw new Error(`OpenAI error: ${r.status} ${txt}`);
              }
              const json = await r.json();
              return json.choices?.[0]?.message?.content || '';
            }

            let aggregate = [];
            if (chunkFiles.length === 0) {
              aggregate.push('No code changes to review after filtering.');
            } else {
              for (const f of chunkFiles) {
                const diff = fs.readFileSync(path.join('.github/ai', f),'utf8');
                const prompt = `${basePrompt}\n\n--- DIFF CHUNK ${f} ---\n${diff}`;
                const out = await askOpenAI(prompt);
                aggregate.push(`### Review for ${f}\n${out}`);
              }
            }
            const full = aggregate.join("\n\n---\n\n");
            fs.writeFileSync('.github/ai/review.md', full);

      - name: Post PR review comment
        if: steps.diff.outputs.has_diff == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('.github/ai/review.md','utf8');
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              event: 'COMMENT',
              body
            });

      - name: Optionally fail on HIGH/CRITICAL findings
        if: steps.diff.outputs.has_diff == 'true' && env.FAIL_ON_SEVERITY != 'none'
        shell: bash
        run: |
          set -euo pipefail
          if grep -Eiq "Severity:\s*(CRITICAL|HIGH)" .github/ai/review.md; then
            if [ "${FAIL_ON_SEVERITY}" != "none" ]; then
              echo "HIGH/CRITICAL findings present. Failing check per policy."
              exit 2
            fi
          fi
