name: Main CI (AI Review + Status)

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'docs/review_status.md'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'docs/review_status.md'

permissions:
  contents: write
  pull-requests: write

jobs:
  ai-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for diffs)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install --disable-pip-version-check requests

      - name: Validate OPENAI_API_KEY
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ] || [ "$OPENAI_API_KEY" = "***" ]; then
            echo "ERROR: OPENAI_API_KEY is missing or placeholder. Add in Settings → Secrets → Actions."
            exit 1
          fi

      - name: Build context pack (code + required docs for peer review)
        run: |
          mkdir -p artifacts/ci artifacts/review/ci docs/reviews docs/reviews_json
          python scripts/ci/make_context_pack.py --out artifacts/ci/context.jsonl || true

          python - << 'PY'
          import json, pathlib
root = pathlib.Path('.')
out = pathlib.Path('artifacts/ci/context.jsonl')
extra = []

def add_file(p: pathlib.Path):
    try:
        if p.is_file() and p.stat().st_size <= 256000:
            txt = p.read_text(encoding='utf-8', errors='replace')
            extra.append({'path': str(p), 'content': txt})
    except Exception:
        pass

# 1) .claude/**/*.md
claude = root/'.claude'
if claude.exists():
    for f in claude.rglob('*.md'):
        add_file(f)

# 2) claude.md
cm = root/'claude.md'
if cm.exists():
    add_file(cm)

# 3) ./docs/requirements/**
req = root/'docs'/'requirements'
if req.exists():
    for f in req.rglob('*'):
        add_file(f)

# 4) ./bugs ./features ./feedback
for dname in ('bugs','features','feedback'):
    d = root/dname
    if d.exists():
        for f in d.rglob('*'):
            add_file(f)

mode = 'a' if out.exists() and out.stat().st_size > 0 else 'w'
with out.open(mode, encoding='utf-8') as fp:
    for rec in extra:
        fp.write(json.dumps(rec, ensure_ascii=False) + "\n")
print(f"Wrote {len(extra)} extra context records → {out}")
          PY

      - name: Read review mode
        id: mode
        run: |
          MODE=diff
          if [ -f ".ci/review_mode.txt" ]; then
            MODE=$(tr -d '\r\n\t ' < .ci/review_mode.txt)
          fi
          if [ "$MODE" != "full" ]; then MODE=diff; fi
          echo "mode=$MODE" >> $GITHUB_OUTPUT

      - name: Generate DIFF (push)
        if: steps.mode.outputs.mode == 'diff' && github.event_name == 'push'
        run: |
          if git rev-parse HEAD^ >/dev/null 2>&1; then
            git diff --unified=0 HEAD^...HEAD > pr.diff || true
          else
            : > pr.diff
          fi

      - name: Generate DIFF (pull_request)
        if: steps.mode.outputs.mode == 'diff' && github.event_name == 'pull_request'
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1 || true
          git diff --unified=0 origin/${{ github.base_ref }}...HEAD > pr.diff || true

      - name: Run AI review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GIT_COMMIT_SHA: ${{ github.sha }}
        run: |
          DIFF_PATH="pr.diff"
          if [ "${{ steps.mode.outputs.mode }}" != "diff" ]; then
            DIFF_PATH="/dev/null"
          fi

          python scripts/ci/ai_review.py \
            --mode ${{ steps.mode.outputs.mode }} \
            --diff "$DIFF_PATH" \
            --context artifacts/ci/context.jsonl \
            --out_json artifacts/ci/ai-review.json \
            --out_md artifacts/review/ci/review.md

          cp artifacts/review/ci/review.md "docs/reviews/${GIT_COMMIT_SHA}.md"
          cp artifacts/ci/ai-review.json  "docs/reviews_json/${GIT_COMMIT_SHA}.json"

      - name: Upload review artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ai-review
          path: |
            artifacts/ci/ai-review.json
            artifacts/review/ci/review.md
            artifacts/ci/context.jsonl

      - name: Commit review docs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/reviews docs/reviews_json
          git commit -m "chore(ci): add AI review for $GITHUB_SHA [skip ci]" || echo "No changes to commit"
          git push

      - name: Write Status Page (docs/review_status.md)
        run: |
          python scripts/ci/write_status_page.py artifacts/ci/ai-review.json

      - name: Commit Status Page
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/review_status.md
          git commit -m "chore(ci): update review status [skip ci]" || echo "No changes to commit"
          git push

      - name: Generate bugs/features/feedback from review + add example code (medium+)
        run: |
          python scripts/ci/postprocess_review.py artifacts/ci/ai-review.json $GITHUB_SHA

      - name: Commit tracker updates (bugs/features/feedback + examples)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bugs features feedback docs/reviews/*_examples.md
          git commit -m "chore(ci): address review items (bugs/features/feedback) and add example code for medium+ [skip ci]" || echo "No changes to commit"
          git push
