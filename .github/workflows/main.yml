name: AI Code Review

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'docs/review_status.md'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - 'docs/review_status.md'

permissions:
  contents: write
  pull-requests: write

jobs:
  ai-review:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: pip install requests

    - name: Run AI review
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        GIT_COMMIT_SHA: ${{ github.sha }}
      run: |
        mkdir -p artifacts/ci artifacts/review/ci docs/reviews docs/reviews_json
        python scripts/ci/ai_review.py \
          --mode diff \
          --diff pr.diff \
          --context artifacts/ci/context.jsonl \
          --out_json artifacts/ci/ai-review.json \
          --out_md artifacts/review/ci/review.md

        # copy results into docs for persistence in repo
        cp artifacts/review/ci/review.md docs/reviews/${GIT_COMMIT_SHA}.md
        cp artifacts/ci/ai-review.json docs/reviews_json/${GIT_COMMIT_SHA}.json

    - name: Commit review files back to repo
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add docs/reviews docs/reviews_json
        git commit -m "chore(ci): add AI review for $GITHUB_SHA [skip ci]" || echo "No changes to commit"
        git push
