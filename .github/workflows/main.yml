name: AI Code Review

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  ai-review:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: pip install requests

    - name: Run AI review
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: |
        mkdir -p reviews
        python scripts/ci/ai_review.py > reviews/ai-review-report.md

    - name: Commit review back to repo
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add reviews/ai-review-report.md
        git commit -m "chore: add AI review report [skip ci]" || echo "No changes to commit"
        git push origin HEAD:main
